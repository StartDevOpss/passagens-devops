apiVersion: apps/v1
kind: Deployment
metadata:
  name: passagens-deployment
  namespace: passagens-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: passagens-bot
  template:
    metadata:
      labels:
        app: passagens-bot
    spec:
      containers:
      - name: bot-container
        image: passagens-bot:latest
        imagePullPolicy: Never
        workingDir: /app
        command: ["python", "src/bot.py"]
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: SERPAPI_KEY
          valueFrom:
            secretKeyRef:
              name: passagens-secrets
              key: SERPAPI_KEY
        - name: DISCORD_WEBHOOK_GERAL
          valueFrom:
            secretKeyRef:
              name: passagens-secrets
              key: DISCORD_WEBHOOK_GERAL
        - name: DISCORD_WEBHOOK_INTERNACIONAL
          valueFrom:
            secretKeyRef:
              name: passagens-secrets
              key: DISCORD_WEBHOOK_INTERNACIONAL
        - name: DISCORD_WEBHOOK_BRASIL
          valueFrom:
            secretKeyRef:
              name: passagens-secrets
              key: DISCORD_WEBHOOK_BRASIL
        - name: DISCORD_WEBHOOK_MALUCOS
          valueFrom:
            secretKeyRef:
              name: passagens-secrets
              key: DISCORD_WEBHOOK_MALUCOS
        - name: DISCORD_WEBHOOK_DATAS
          valueFrom:
            secretKeyRef:
              name: passagens-secrets
              key: DISCORD_WEBHOOK_DATAS
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: passagens-secrets
              key: GITHUB_TOKEN
        - name: GITHUB_REPO
          value: "StartDevOpss/passagens-devops"