name: Deploy Passagens Bot

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Importante para permitir o envio da imagem

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Helm
        uses: azure/setup-helm@v4.2.0

      - name: Validar Helm Chart (Lint)
        run: helm lint ./helm/passagens-bot/

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push da Imagem Real
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/startdevopss/passagens-bot:latest
            ghcr.io/startdevopss/passagens-bot:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > $HOME/.kube/config

      - name: Deploy updated image
        run: |
          # Atualizando para o nome do container e imagem corretos
          kubectl set image deployment/passagens-deployment bot-container=ghcr.io/startdevopss/passagens-bot:${{ github.sha }} -n passagens-bot
          kubectl rollout status deployment/passagens-deployment -n passagens-bot